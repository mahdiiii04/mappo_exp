seed: 42
experiment_name: "rock_paper_scissors_2"

train:
  num_epochs: 10
  minibatch_size: 4096
  actor_lr: 1e-4
  critic_lr: 1e-3
  max_grad_norm: 40.0
  device: ???
  tau: 0.005
  actor_tau: 0.02

env:
  max_steps: 100
  scenario_name: "biased_rps"
  scenario: {} 
  device: ???
  num_envs: ??

model:
  shared_params: True
  centralised_critic: True

collector:
  frames_per_batch: 51200
  n_iters: 100
  total_frames: ???

buffer:
  memory_size: ???

loss:
  entropy_eps: 0.01
  alpha: 0.1
  gamma: 0.9

eval: 
  frequency: 10

logger: {}

hydra:
  run: 
    dir: ./outputs/${experiment_name}
  output_subdir: .hydra